spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/techmo_auth}
    username: ${SPRING_DATASOURCE_USERNAME:techmo}
    password: ${SPRING_DATASOURCE_PASSWORD:techmo_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret}
      timeout: 5000

server:
  port: 8081
  error:
    include-message: never
    include-binding-errors: never

jwt:
  secret: ${JWT_SECRET:change_me_in_production_use_a_very_long_secret_at_least_64_chars}
  expiry-ms: ${JWT_EXPIRY_MS:900000}
  refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.techmo: INFO
    org.springframework.security: WARN
